<svg xmlns="http://www.w3.org/2000/svg" width="700" height="220" viewBox="0 0 700 220">
  <rect width="700" height="220" fill="#fff"/>
  <rect x="30" y="60" width="120" height="50" rx="12" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="90" y="90" font-size="15" text-anchor="middle" fill="#1976d2">GitHub Push/PR</text>
  <rect x="180" y="60" width="120" height="50" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="240" y="90" font-size="15" text-anchor="middle" fill="#388e3c">CI: Lint/Test</text>
  <rect x="330" y="60" width="120" height="50" rx="12" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="390" y="90" font-size="15" text-anchor="middle" fill="#f57c00">Build</text>
  <rect x="480" y="60" width="120" height="50" rx="12" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2"/>
  <text x="540" y="90" font-size="15" text-anchor="middle" fill="#8e24aa">Deploy (Vercel)</text>
  <rect x="630" y="60" width="40" height="50" rx="12" fill="#e0f7fa" stroke="#00838f" stroke-width="2"/>
  <text x="650" y="90" font-size="13" text-anchor="middle" fill="#00838f">Live</text>
  <line x1="150" y1="85" x2="180" y2="85" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="85" x2="330" y2="85" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="85" x2="480" y2="85" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="85" x2="630" y2="85" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 L3,5 z" fill="#888" />
    </marker>
  </defs>
</svg>
